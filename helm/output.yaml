---
# Source: madgoat/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  labels:
    io.mad.service: lesson
  name: lesson
spec:
  ports:
    - name: "3000"
      port: 3000
      targetPort: 3000
  selector:
    io.mad.service: lesson
---
# Source: madgoat/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lesson
  labels:
    io.mad.service: lesson
spec:
  replicas: 1
  selector:
    matchLabels:
      io.mad.service: lesson
  template:
    metadata:
      labels:
        io.mad.service: lesson
    spec:
      containers:
        - name: lesson
          image: ghcr.io/mad-goat-project/mad-lessons-service:main
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
          - configMapRef:
              name: env-lesson
          - configMapRef:
              name: env-keycloak-secrets
          resources:
            limits:
              cpu: 500m
              memory: "500Mi"
            requests:
              cpu: 250m
              memory: "250Mi"
      restartPolicy: Always
---
