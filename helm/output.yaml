# Source: madgoat/templates/service.yaml
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lesson
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`madgoat.tech`) && PathPrefix(`/api/lessons`)
      middlewares:
        - name: strip-prefix-lesson
      services:
        - kind: Service
          name: lesson
          namespace: default
          port: 3000
---
# Source: madgoat/templates/service.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix-lesson
spec:
  stripPrefixRegex:
    regex:
        /api/lessons
