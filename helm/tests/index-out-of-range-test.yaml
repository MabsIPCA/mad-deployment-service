# Test: Index on empty/missing list - fails on index out of range
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-index-test
data:
  # Fails with: index out of range when .Values.items is empty or nil
  firstItem: {{ index .Values.items 0 | quote }}
  # Fails when trying to access second element of missing list
  secondServer: {{ index .Values.servers 1 | quote }}
  # Fails when .Values.replicas is nil or has less than 3 elements
  thirdReplica: {{ index .Values.replicas 2 | quote }}

