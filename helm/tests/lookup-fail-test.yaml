# Test: Lookup failures - fails when Kubernetes resource doesn't exist
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-lookup-test
data:
  # Fails if Secret doesn't exist and required
  {{- $secret := lookup "v1" "Secret" .Release.Namespace "required-secret" }}
  {{- if not $secret }}
  error: {{ fail "Secret 'required-secret' must exist in the namespace" }}
  {{- end }}
  secretData: {{ $secret.data.key | quote }}
  # Fails if ConfigMap doesn't exist
  {{- $cm := lookup "v1" "ConfigMap" .Release.Namespace "required-config" }}
  configValue: {{ required "ConfigMap 'required-config' not found" $cm.data.setting }}

