madServices:
  - name: lesson
    deployment:
      image: ghcr.io/mad-goat-project/mad-lessons-service:main
      ports:
        - containerPort: 3000
          protocol: TCP
      envFromConfigMaps:
        - env-lesson
        - env-keycloak-secrets
    service:
      ports:
        - name: "3000"
          port: 3000
          targetPort: 3000
      traefik:
        routes:
          - name: lesson
            service:
              name: lesson
              port: 3000
            middleware:
              name: strip-prefix-lessons
              stripPrefix: "/api/lessons"

  - name: docs
    deployment:
      image: ghcr.io/mad-goat-project/mad-goat-docs:main
      ports:
        - containerPort: 4000
          protocol: TCP
    service:
      ports:
        - name: "4000"
          port: 4000
          targetPort: 80
      traefik:
        routes:
          - name: docs
            service:
              name: docs
              port: 80
            middleware:
              name: strip-prefix-docs
              stripPrefix: "/api/docs"

  - name: profile
    deployment:
      image: ghcr.io/mad-goat-project/mad-profile-service:main
      ports:
        - containerPort: 3000
          protocol: TCP
      envFromConfigMaps:
        - env-profile
        - env-keycloak-secrets
    service:
      ports:
        - name: "3000"
          port: 3000
          targetPort: 3000
      traefik:
        routes:
          - name: profile
            service:
              name: profile
              port: 3000
            middleware:
              name: strip-prefix-profile
              stripPrefix: "/api/profile"

  - name: scoreboard
    deployment:
      image: ghcr.io/mad-goat-project/mad-scoreboard-service:main
      ports:
        - containerPort: 3000
          protocol: TCP
      envFromConfigMaps:
        - env-scoreboard
        - env-keycloak-secrets
    service:
      ports:
        - name: "3004"
          port: 3004
          targetPort: 3000
      traefik:
        routes:
          - name: scoreboard
            service:
              name: scoreboard
              port: 3004
            middleware:
              name: strip-prefix-scoreboard
              stripPrefix: "/api/scoreboard"

  - name: webapp
    deployment:
      image: ghcr.io/mad-goat-project/mad-web-app:madgoat-tech
      ports:
        - containerPort: 80
          protocol: TCP
      envFromConfigMaps:
        - env-webapp
    service:
      ports:
        - name: "3000"
          port: 3000
          targetPort: 80
      traefik:
        routes:
          - name: webapp
            service:
              name: webapp
              port: 3000
            middleware:
              name: strip-prefix-scoreboard
              stripPrefix: "/api/scoreboard"

configMaps:
  - name: env-lesson
    data:
      DB_HOST: "db-lesson"
      DB_PORT: "5432"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "lessons"

      # Lesson Database"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "lessons"

      # RabbitMQ"
      RMQ_PRODUCER_QUEUE: "lesson_completed_queue"
      RMQ_PRODUCER_URL: "amqp://guest:guest@rabbitmq:5672"
      RMQ_PRODUCER_QUEUE_DURABLE: "true"

      NODE_ENV: "development"
  - name: env-profile
    data:
      GO_ENV: "production"
      GO_PORT: "3000"
      JWT_SECRET: ""
  - name: env-webapp
    data:
      # Web Application
      VITE_KEYCLOAK_URL: "keycloak.madgoat.tech"
      VITE_KEYCLOAK_REALM: "MADGoat"
      VITE_KEYCLOAK_CLIENT_ID: "mad-goat-web-app"

      VITE_LESSON_BASE_URL: "http://madgoat.tech/api/lessons"
      VITE_GOAT4SHELL_BASE_URL: "http://madgoat.tech/api/goat4shell-unsafe"
      VITE_SCOREBOARD_BASE_URL: "http://madgoat.tech/api/scoreboard"
      VITE_DOCS_BASE_URL: "http://madgoat.tech/api/docs"
      VITE_PROFILE_BASE_URL: "http://madgoat.tech/profile/api/v1"
      VITE_OBJECT_STORAGE_BASE_URL: "http://madgoat.tech/s3/mad-images"
  - name: env-keycloak-secrets
    data:
      KC_CLIENT_ID: "mad-goat-services"
      KC_REALM: "MADGoat"
      KC_SECRET: "RvWEVib2wgZRr7DnOIQzW1JISiNWSHhz"
      KC_SERVER_URL: "http://keycloak.madgoat.tech"