{{- range .Values.madServices }}
  {{- if hasKey . "service" }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.mad.service: {{ .name }}
  name: {{ .name }}
spec:
  ports:
  {{- range .service.ports }}
    - name: "{{ .name }}"
      port: {{ .port }}
      targetPort: {{ .targetPort }}
  {{- end }}
  selector:
    io.mad.service: {{ .name }}
---
    {{- if hasKey .service "traefik" }}
      {{- range .service.traefik.routes }}
        {{- if hasKey . "middleware" }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix-{{ .name }}
spec:
  stripPrefixRegex:
    regex:
        - "{{ .middleware.stripPrefix }}"
        {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .name }}
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
        {{- if hasKey .middleware "stripPrefix" }}
      match: Host(`madgoat.tech`) && PathPrefix(`{{.middleware.stripPrefix}}`)
        {{- else }}
      match: Host(`madgoat.tech`) && PathPrefix(`/`)
        {{- end }}
        {{- if hasKey . "middleware" }}
      middlewares:
        - name: strip-prefix-{{.name}}
       {{- end}}
      services:
        - kind: Service
          name: {{ .service.name }}
          namespace: default
          port: {{ .service.port }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}