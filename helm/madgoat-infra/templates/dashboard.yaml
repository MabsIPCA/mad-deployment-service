{{- if .Values.vulnerabilities.k06_traefikDashboardExposed }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard
  labels:
    io.mad.vuln: k06-traefikDashboardExposed
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/dashboard`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
{{- end }}
