apiVersion: v1
kind: Service
metadata:
  labels:
    io.mad.service: minio
  name: minio
spec:
  ports:
    - name: "9000"
      port: 9000
      targetPort: 9000
    - name: "9001"
      port: 9001
      targetPort: 9001
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-9000
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`s3-console.mad.localhost`)
      services:
        - kind: Service
          name: minio
          namespace: default
          port: 9000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-9001
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`s3-console.mad.localhost`)
      services:
        - kind: Service
          name: minio
          namespace: default
          port: 9001
    - kind: Rule
      match: Host(`s3-console.mad.localhost`)
      services:
        - kind: Service
          name: minio
          namespace: default
          port: 9001