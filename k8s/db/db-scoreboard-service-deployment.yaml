apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.mad.service: db-scoreboard-service
  name: db-scoreboard-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.mad.service: db-scoreboard-service
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.mad.service: db-scoreboard-service
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: env-scoreboard
          image: mongo:6.0
          name: db-scoreboard-service
          ports:
            - containerPort: 27017
          resources:
            limits:
              cpu: 500m
              memory: "500Mi"
            requests:
              cpu: 250m
              memory: "250Mi"
          volumeMounts:
            - mountPath: /data/db
              name: db-scoreboard-service-claim
      restartPolicy: Always
      volumes:
        - name: db-scoreboard-service-claim
          hostPath:
            path: /host/compose/data/db-scoreboard-service
            type: DirectoryOrCreate
