apiVersion: v1
kind: Service
metadata:
  labels:
    io.mad.service: mad4shell-service-safe
  name: mad4shell-service-safe
spec:
  ports:
    - name: "3002"
      port: 3002
      targetPort: 8080
  selector:
    io.mad.service: mad4shell-service-safe
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix-safe
spec:
  stripPrefixRegex:
    regex:
      - "/goat4shell-safe"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-app
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`api.mad.localhost`) && PathPrefix(`/goat4shell-safe`)
      middlewares:
        - name: strip-prefix-safe
      services:
        - kind: Service
          name: mad4shell-service-safe
          namespace: default
          port: 8080
