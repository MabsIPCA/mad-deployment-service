apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.mad.service: profile-service
  name: profile-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.mad.service: profile-service
  template:
    metadata:
      labels:
        io.mad.service: profile-service
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: env-profile
          image: ghcr.io/mad-goat-project/mad-profile-service:main
          name: mad-profile-service
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: "500Mi"
            requests:
              cpu: 250m
              memory: "250Mi"
      restartPolicy: Always
