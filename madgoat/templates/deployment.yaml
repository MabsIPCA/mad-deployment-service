---
# Source: madgoat/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 
  labels:
    io.mad.service: 
spec:
  replicas: 1
  selector:
    matchLabels:
      io.mad.service: 
  template:
    metadata:
      labels:
        io.mad.service: 
        io.mad.network/mad-network: "true"
    spec:
      containers:
        - name: 
          image: ghcr.io/mad-goat-project/mad-lessons-service:main
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
          - configMapRef:
              name: env-lesson
          - configMapRef:
              name: env-keycloak-secrets
          resources:
            limits:
              cpu: 500m
              memory: "512Mi"
            requests:
              cpu: 250m
              memory: "256Mi"
      restartPolicy: Always
