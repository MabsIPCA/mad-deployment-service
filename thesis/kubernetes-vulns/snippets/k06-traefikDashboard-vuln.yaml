# K06-a vulnerable: k06_traefikDashboardExposed=true (pre-injected)
# Traefik dashboard IngressRoute — no auth middleware, publicly accessible
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: "Host(`traefik.localhost`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
