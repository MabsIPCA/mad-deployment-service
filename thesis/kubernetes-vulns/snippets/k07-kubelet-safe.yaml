# K07 remediated: make reset-safe (no --extra-config kubelet flags)
# Minikube default — webhook authentication and webhook authorisation
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
authentication:
  anonymous:
    enabled: false
  webhook:
    enabled: true
    cacheTTL: "2m0s"
authorization:
  mode: Webhook
