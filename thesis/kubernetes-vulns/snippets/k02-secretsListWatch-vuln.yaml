# K02-b vulnerable: k02_secretsListWatch=true
# Role grants list+watch on all Secrets — allows bulk credential harvesting
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mad-secrets-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
